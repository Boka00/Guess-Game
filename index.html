<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guess Game</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Kumbh+Sans:wght,YOPQ@100..900,300&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Press+Start+2P&family=Quicksand:wght@300..700&family=Roboto:ital,wdth,wght@0,75..100,200;1,75..100,200&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div class="header">
        <button class="btn active">Again!</button>
        <p>(Between 1 and 20)</p>
      </div>
      <h1 class="title">Guess My Number!</h1>
    </header>
    <span class="line">
      <div class="mark-box">
        <p class="secret">?</p>
      </div>
    </span>
    <main class="main-container">
      <section class="left-section">
        <input
          id="input"
          name="input"
          type="number"
          class="input"
          min="1"
          max="20"
        />
        <button id="btn" class="active">Check!</button>
      </section>
      <section class="right-section">
        <p class="guess message">Start guessing...</p>
        <p>💯 Score: <span class="score">20</span></p>
        <p>🥇 Highscore: <span class="highscore">0</span></p>
      </section>
    </main>
  </body>
  <script src="script.js"></script>
</html>
